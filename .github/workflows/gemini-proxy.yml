name: Gemini API Proxy

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to Gemini'
        required: true
        default: 'Hello'
      model:
        description: 'Gemini model name'
        required: true
        default: 'gemini-2.0-flash'
      request_id:
        description: 'Unique request ID'
        required: true

permissions:
  contents: write

jobs:
  call-gemini:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Call Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
          INPUT_MODEL: ${{ github.event.inputs.model }}
          INPUT_REQUEST_ID: ${{ github.event.inputs.request_id }}
        run: |
          python3 << 'PYSCRIPT'
          import json, urllib.request, os, time, sys

          message = os.environ['INPUT_MESSAGE']
          model = os.environ['INPUT_MODEL']
          request_id = os.environ['INPUT_REQUEST_ID']
          api_key = os.environ['GEMINI_API_KEY']

          print(f"Model: {model}")
          print(f"Message: {message[:80]}...")

          payload = json.dumps({
              "contents": [{"parts": [{"text": message}]}],
              "generationConfig": {"temperature": 0.7, "maxOutputTokens": 2048}
          }).encode()

          url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={api_key}"

          for attempt in range(4):
              try:
                  req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"})
                  resp = urllib.request.urlopen(req, timeout=60)
                  data = json.loads(resp.read())
                  
                  with open(f"result_{request_id}.json", "w") as f:
                      json.dump(data, f, ensure_ascii=False, indent=2)
                  
                  answer = data["candidates"][0]["content"]["parts"][0]["text"]
                  print(f"Gemini Response: {answer}")
                  break
                  
              except urllib.error.HTTPError as e:
                  body = e.read().decode()[:300]
                  if e.code == 429:
                      wait = 30 * (attempt + 1)
                      print(f"Rate limited (429), waiting {wait}s... (attempt {attempt+1}/4)")
                      time.sleep(wait)
                  else:
                      print(f"HTTP Error {e.code}: {body}")
                      sys.exit(1)
              except Exception as e:
                  print(f"Error: {e}")
                  sys.exit(1)
          else:
              print("Failed after 4 retries due to rate limiting")
              sys.exit(1)
          PYSCRIPT

      - name: Commit result
        run: |
          git config user.name "Gemini Proxy Bot"
          git config user.email "bot@example.com"
          git add result_*.json || true
          git commit -m "Add result for ${{ github.event.inputs.request_id }}" || true
          git push
