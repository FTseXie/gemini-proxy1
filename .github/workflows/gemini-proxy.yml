name: Gemini API Proxy

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to Gemini'
        required: true
        default: 'Hello'
      model:
        description: 'Gemini model name'
        required: true
        default: 'gemini-2.0-flash'
      request_id:
        description: 'Unique request ID'
        required: true

permissions:
  contents: write

jobs:
  call-gemini:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Call Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          MESSAGE="${{ github.event.inputs.message }}"
          MODEL="${{ github.event.inputs.model }}"
          REQUEST_ID="${{ github.event.inputs.request_id }}"

          echo "Calling Gemini API..."
          echo "Model: $MODEL"

          # Write payload to file to avoid shell escaping issues
          python3 -c "
          import json, urllib.request
          msg = '''${MESSAGE}'''
          payload = json.dumps({
              'contents': [{'parts': [{'text': msg}]}],
              'generationConfig': {'temperature': 0.7, 'maxOutputTokens': 2048}
          }).encode()
          url = 'https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=' + open('/dev/stdin').read().strip() if False else ''
          req = urllib.request.Request(
              'https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=' + __import__('os').environ['GEMINI_API_KEY'],
              data=payload,
              headers={'Content-Type': 'application/json'}
          )
          resp = urllib.request.urlopen(req)
          data = json.loads(resp.read())
          with open('result_${REQUEST_ID}.json', 'w') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          try:
              answer = data['candidates'][0]['content']['parts'][0]['text']
              print('Gemini Response: ' + answer)
          except:
              print('ERROR: Could not parse response')
              print(json.dumps(data)[:500])
          "

      - name: Commit result
        run: |
          git config user.name "Gemini Proxy Bot"
          git config user.email "bot@example.com"
          git add result_*.json || true
          git commit -m "Add result for ${{ github.event.inputs.request_id }}" || true
          git push
