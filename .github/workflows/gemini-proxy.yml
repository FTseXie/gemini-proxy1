name: Gemini API Proxy

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to Gemini'
        required: true
        default: 'Hello'
      model:
        description: 'Gemini model name'
        required: true
        default: 'gemini-2.0-flash'
      request_id:
        description: 'Unique request ID'
        required: true

permissions:
  contents: write

jobs:
  call-gemini:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup script
        run: |
          cat > call_gemini.py << 'SCRIPT'
          import json, urllib.request, os, time, sys

          message = os.environ.get('INPUT_MESSAGE', 'Hello')
          model = os.environ.get('INPUT_MODEL', 'gemini-2.0-flash')
          request_id = os.environ.get('INPUT_REQUEST_ID', 'default')
          api_key = os.environ.get('GEMINI_API_KEY', '')

          print(f"Model: {model}")
          print(f"Message: {message[:80]}...")

          payload = json.dumps({
              "contents": [{"parts": [{"text": message}]}],
              "generationConfig": {"temperature": 0.7, "maxOutputTokens": 2048}
          }).encode()

          url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={api_key}"
          req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"})

          # Retry up to 3 times for rate limits
          for attempt in range(3):
              try:
                  resp = urllib.request.urlopen(req, timeout=30)
                  data = json.loads(resp.read())
                  
                  with open(f"result_{request_id}.json", "w") as f:
                      json.dump(data, f, ensure_ascii=False, indent=2)
                  
                  try:
                      answer = data["candidates"][0]["content"]["parts"][0]["text"]
                      print(f"Gemini Response: {answer}")
                  except (KeyError, IndexError):
                      print(f"ERROR: Could not parse response")
                      print(json.dumps(data, ensure_ascii=False)[:500])
                  break
                  
              except urllib.error.HTTPError as e:
                  if e.code == 429:
                      wait = 10 * (attempt + 1)
                      print(f"Rate limited, waiting {wait}s... (attempt {attempt+1}/3)")
                      time.sleep(wait)
                  else:
                      body = e.read().decode()[:500]
                      print(f"HTTP Error {e.code}: {body}")
                      sys.exit(1)
          else:
              print("Failed after 3 retries")
              sys.exit(1)
          SCRIPT

      - name: Call Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
          INPUT_MODEL: ${{ github.event.inputs.model }}
          INPUT_REQUEST_ID: ${{ github.event.inputs.request_id }}
        run: python3 call_gemini.py

      - name: Commit result
        run: |
          git config user.name "Gemini Proxy Bot"
          git config user.email "bot@example.com"
          git add result_*.json || true
          git commit -m "Add result for ${{ github.event.inputs.request_id }}" || true
          git push
